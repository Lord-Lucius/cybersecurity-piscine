# ============================================================================ #
#  inquisitor — ARP poisoning test lab                                         #
#                                                                              #
#  Addressing plan (lab network 192.168.0.0/24):                               #
#    .1  bridge gateway (managed by Docker)                                    #
#    .2  server   (FTP)                                                        #
#    .3  client   (victim)                                                     #
#    .4  attacker (inquisitor)                                                 #
#                                                                              #
#  MAC plan: 02:42 (locally-administered prefix) + IPv4 in hex                 #
#    .2 -> 02:42:c0:a8:00:02   .3 -> 02:42:c0:a8:00:03   .4 -> 02:42:c0:a8:00:04
#  => deterministic MACs, passed as-is to inquisitor.                          #
# ============================================================================ #
services:

  # -------------------------------------------------------------------------- #
  #  FTP server (vsftpd, plaintext on port 21) — the sniffing target           #
  # -------------------------------------------------------------------------- #
  server:
    container_name: server
    image: garethflowers/ftp-server
    environment:
      - FTP_USER=test
      - FTP_PASS=1234
      - PUBLIC_IP=192.168.0.2
      - UID=1000
    volumes:
      - ./data:/home/user
    networks:
      lab:
        ipv4_address: 192.168.0.2
        mac_address: 02:42:c0:a8:00:02
    restart: unless-stopped

  # -------------------------------------------------------------------------- #
  #  FTP client — the victim initiating transfers                              #
  # -------------------------------------------------------------------------- #
  client:
    container_name: client
    image: alpine:3.20
    command: sh -c "apk add --no-cache lftp && sleep infinity"
    depends_on:
      - server
    networks:
      lab:
        ipv4_address: 192.168.0.3
        mac_address: 02:42:c0:a8:00:03
    restart: unless-stopped

  # -------------------------------------------------------------------------- #
  #  Attacker — runs inquisitor (transparent MITM)                             #
  # -------------------------------------------------------------------------- #
  attacker:
    container_name: attacker
    build: ./attacker
    command: sleep infinity
    working_dir: /inquisitor
    volumes:
      - .:/inquisitor
    cap_add:
      - NET_RAW
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.send_redirects=0
      - net.ipv4.conf.default.send_redirects=0
    stdin_open: true
    tty: true
    depends_on:
      - server
      - client
    networks:
      lab:
        ipv4_address: 192.168.0.4
        mac_address: 02:42:c0:a8:00:04
    restart: unless-stopped

# ---------------------------------------------------------------------------- #
#  Lab network — custom bridge: the 3 hosts share one L2 segment (ARP works).  #
#  Same-network containers reach every port directly, so no `ports:` mapping   #
#  is needed for FTP (21 + passive range) between client and server.           #
# ---------------------------------------------------------------------------- #
networks:
  lab:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.0.0/24
          gateway: 192.168.0.1
